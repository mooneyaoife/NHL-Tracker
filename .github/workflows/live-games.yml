name: Refresh active NHL games

on:
  workflow_dispatch:
  schedule:
    # Hourly during likely NHL game hours. The Cloudflare overlay supplies
    # minute-level live views without rebuilding the whole static site.
    - cron: "7 0-10,16-23 * 1-6,9-12 *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: nhl-tracker
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - id: live
        name: Check for and refresh active tracked games
        run: python scripts/update_tracker.py --live-only
      - if: steps.live.outputs.active == 'true'
        name: Validate live data and application contracts
        run: |
          python scripts/generate_build_metadata.py
          node --check site/app.js
          node --check site/game-state.js
          node --check site/cloudflare-live.js
          node tests/game_state.test.js
          node tests/cloudflare_live_overlay.test.js
          node tests/live_updates.test.js
          node --check site/statistics.js
          node --check site/sw.js
          node tests/data_integrity.test.js
          node tests/site_contract.test.js
          node tests/workflow_contract.test.js
      - if: steps.live.outputs.active == 'true'
        name: Check and summarize live artifact health
        env:
          MAX_FRESH_AGE_HOURS: ${{ vars.MAX_FRESH_ARTIFACT_AGE_HOURS || '24' }}
          MAX_FALLBACK_AGE_HOURS: ${{ vars.MAX_FALLBACK_ARTIFACT_AGE_HOURS || '72' }}
        run: >-
          python scripts/check_artifact_health.py
          --max-fresh-age-hours "$MAX_FRESH_AGE_HOURS"
          --max-fallback-age-hours "$MAX_FALLBACK_AGE_HOURS"
      - if: steps.live.outputs.active == 'true'
        uses: actions/configure-pages@v6
      - if: steps.live.outputs.active == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - if: steps.live.outputs.active == 'true'
        id: deployment
        uses: actions/deploy-pages@v5
      - if: steps.live.outputs.active == 'true' && vars.CLOUDFLARE_DEPLOY_ENABLED == 'true'
        name: Build parallel Cloudflare Pages artifact
        env:
          CLOUDFLARE_PAGES_URL: ${{ vars.CLOUDFLARE_PAGES_URL }}
        run: |
          test -n "$CLOUDFLARE_PAGES_URL"
          python scripts/build_cloudflare.py --production-url "$CLOUDFLARE_PAGES_URL"
          python scripts/verify_cloudflare_build.py --production-url "$CLOUDFLARE_PAGES_URL"
      - if: steps.live.outputs.active == 'true' && vars.CLOUDFLARE_DEPLOY_ENABLED == 'true'
        name: Deploy parallel Cloudflare Pages site
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_PAGES_PROJECT"
          npx --yes wrangler@4.110.0 pages deploy .cloudflare-build \
            --project-name "$CLOUDFLARE_PAGES_PROJECT" \
            --branch main
      - if: always() && steps.live.outputs.active == 'true'
        name: Summarize live deployment destinations
        env:
          PUBLIC_URL: ${{ steps.deployment.outputs.page_url }}
          PRIVATE_URL: ${{ vars.CLOUDFLARE_PAGES_URL }}
        run: |
          echo "### Deployment destinations" >> "$GITHUB_STEP_SUMMARY"
          echo "- GitHub Pages: ${PUBLIC_URL:-not deployed}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Private Cloudflare: ${PRIVATE_URL:-not configured}" >> "$GITHUB_STEP_SUMMARY"
