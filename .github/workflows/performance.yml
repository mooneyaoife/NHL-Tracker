name: Mobile performance and accessibility budgets

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "site/**"
      - "performance-budgets.json"
      - "lighthouserc.json"
      - "scripts/check_performance_budgets.py"
      - ".github/workflows/performance.yml"

permissions:
  contents: read

jobs:
  budgets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v5
        with:
          version: 11.9.0
          run_install: false
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Check deterministic payload budgets
        run: python scripts/check_performance_budgets.py
      - name: Serve the committed artifact
        run: python scripts/serve_static_gzip.py --port 4173 --directory site >/tmp/nhl-tracker-http.log 2>&1 &
      - name: Check throttled mobile LCP and accessibility
        run: pnpm exec lhci autorun
