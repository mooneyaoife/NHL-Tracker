name: Validate and deploy existing artifact

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Generate scheduled NHL data"]
    types: [completed]
    branches: [main]
  push:
    branches: [main]
    paths:
      - "site/**"
      - "deployment/**"
      - "scripts/build_cloudflare.py"
      - "scripts/check_artifact_health.py"
      - "scripts/verify_cloudflare_build.py"
      - "tests/**"
      - ".github/workflows/validate-and-deploy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: nhl-tracker-deploy
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
        with:
          # A scheduled generator commits after its run starts. Deploy the latest
          # default-branch commit rather than the generator's original head SHA.
          ref: ${{ github.event_name == 'workflow_run' && github.event.repository.default_branch || github.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Validate committed artifact without refreshing upstream data
        run: |
          python scripts/generate_build_metadata.py
          python -m unittest discover -s tests -p 'test_*.py'
          node --check site/app.js
          node --check site/game-state.js
          node --check site/cloudflare-live.js
          node --check site/sw.js
          node tests/game_state.test.js
          node tests/frontend_statistics.test.js
          node tests/cloudflare_live_overlay.test.js
          node tests/live_updates.test.js
          node tests/data_integrity.test.js
          node tests/site_contract.test.js
          node tests/workflow_contract.test.js
          python scripts/validate_mail_feed.py
      - name: Check artifact health and freshness
        env:
          MAX_FRESH_AGE_HOURS: ${{ vars.MAX_FRESH_ARTIFACT_AGE_HOURS || '24' }}
          MAX_FALLBACK_AGE_HOURS: ${{ vars.MAX_FALLBACK_ARTIFACT_AGE_HOURS || '72' }}
        run: >-
          python scripts/check_artifact_health.py
          --max-fresh-age-hours "$MAX_FRESH_AGE_HOURS"
          --max-fallback-age-hours "$MAX_FALLBACK_AGE_HOURS"
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: pages
        uses: actions/deploy-pages@v5
      - name: Build and verify private Cloudflare artifact
        if: vars.CLOUDFLARE_DEPLOY_ENABLED == 'true'
        env:
          CLOUDFLARE_PAGES_URL: ${{ vars.CLOUDFLARE_PAGES_URL }}
        run: |
          test -n "$CLOUDFLARE_PAGES_URL"
          python scripts/build_cloudflare.py --production-url "$CLOUDFLARE_PAGES_URL"
          python scripts/verify_cloudflare_build.py --production-url "$CLOUDFLARE_PAGES_URL"
      - name: Deploy private Cloudflare artifact
        if: vars.CLOUDFLARE_DEPLOY_ENABLED == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_PAGES_PROJECT"
          npx --yes wrangler@4.110.0 pages deploy .cloudflare-build \
            --project-name "$CLOUDFLARE_PAGES_PROJECT" \
            --branch main
      - name: Authenticated Cloudflare smoke check
        if: vars.CLOUDFLARE_DEPLOY_ENABLED == 'true'
        env:
          PRIVATE_URL: ${{ vars.CLOUDFLARE_PAGES_URL }}
          ACCESS_ID: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_ID }}
          ACCESS_SECRET: ${{ secrets.CLOUDFLARE_ACCESS_CLIENT_SECRET }}
        run: |
          test -n "$PRIVATE_URL"
          test -n "$ACCESS_ID"
          test -n "$ACCESS_SECRET"
          for path in / /data/tracker.json /api/health; do
            curl --fail --silent --show-error --output /dev/null \
              --header "CF-Access-Client-Id: $ACCESS_ID" \
              --header "CF-Access-Client-Secret: $ACCESS_SECRET" \
              "${PRIVATE_URL%/}$path"
          done
      - name: Summarize deployment destinations
        if: always()
        env:
          PUBLIC_URL: ${{ steps.pages.outputs.page_url }}
          PRIVATE_URL: ${{ vars.CLOUDFLARE_PAGES_URL }}
        run: |
          echo "### Deployment destinations" >> "$GITHUB_STEP_SUMMARY"
          echo "- GitHub Pages: ${PUBLIC_URL:-not deployed}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Private Cloudflare: ${PRIVATE_URL:-not configured}" >> "$GITHUB_STEP_SUMMARY"
