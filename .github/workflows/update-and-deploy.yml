name: Generate scheduled NHL data

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. Data is rendered for Europe/London in the application.
    - cron: "20 7,12,18,23 * * *"

permissions:
  contents: write

concurrency:
  group: nhl-tracker-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Update NHL data
        run: python scripts/update_tracker.py
      - name: Validate generated data and application contracts
        run: |
          python scripts/generate_build_metadata.py
          python -m unittest discover -s tests -p 'test_*.py'
          node --check site/app.js
          node --check site/game-state.js
          node --check site/cloudflare-live.js
          node --check site/statistics.js
          node tests/game_state.test.js
          node tests/cloudflare_live_overlay.test.js
          node tests/live_updates.test.js
          node --check site/sw.js
          node tests/frontend_statistics.test.js
          node tests/data_integrity.test.js
          node tests/site_contract.test.js
          node tests/workflow_contract.test.js
          python scripts/validate_mail_feed.py
      - name: Check and summarize generated artifact
        env:
          MAX_FRESH_AGE_HOURS: ${{ vars.MAX_FRESH_ARTIFACT_AGE_HOURS || '24' }}
          MAX_FALLBACK_AGE_HOURS: ${{ vars.MAX_FALLBACK_ARTIFACT_AGE_HOURS || '72' }}
        run: >-
          python scripts/check_artifact_health.py
          --max-fresh-age-hours "$MAX_FRESH_AGE_HOURS"
          --max-fallback-age-hours "$MAX_FALLBACK_AGE_HOURS"
      - name: Save generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/data data/cache
          git diff --cached --quiet || git commit -m "Update NHL data"
          git push
